<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JOBASSIST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0b1f3a;--ink2:#1c3557;--accent:#1a6fc4;--sky:#e6f0fb;
  --muted:#5a6e88;--border:#d4dfe9;--white:#fff;--bg:#f5f8fc;
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;color:var(--ink);background:var(--white);line-height:1.7;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;gap:1rem}
.logo{font-size:1.1rem;font-weight:700;letter-spacing:1px;color:var(--ink);white-space:nowrap}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:4px;flex:1;justify-content:center}
.nav-links a{font-size:.8rem;font-weight:500;color:var(--muted);padding:5px 12px;border-radius:20px;border:1px solid transparent;transition:all .2s;white-space:nowrap}
.nav-links a:hover{color:var(--accent);border-color:var(--border);background:var(--sky)}
.lang-btn{display:flex;gap:4px}
.lang-btn button{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.78rem;cursor:pointer;color:var(--muted);font-weight:500;transition:all .2s}
.lang-btn button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.divider{height:4px;background:linear-gradient(90deg,var(--accent),#7ab3e8 50%,transparent)}

/* HERO */
.hero{background:var(--ink);padding:90px 5vw;position:relative;overflow:hidden;min-height:92vh;display:flex;align-items:center}
canvas#hero-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.35}
.hero-inner{max-width:700px;position:relative;z-index:1}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(26,111,196,.2);border:1px solid rgba(26,111,196,.35);border-radius:20px;padding:5px 14px;font-size:.78rem;color:#7ab3e8;font-weight:500;margin-bottom:1.8rem}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:#7ab3e8}
.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:700;line-height:1.15;color:#fff;margin-bottom:1.2rem}
.hero h1 em{font-style:normal;color:#7ab3e8}
.hero-sub{font-size:1rem;color:#8ca9c9;max-width:520px;margin-bottom:2.2rem}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-p{background:var(--accent);color:#fff;padding:13px 28px;border-radius:8px;font-weight:600;font-size:.95rem;transition:background .2s;display:inline-block}
.btn-p:hover{background:#155fa0}
.btn-g{background:rgba(255,255,255,.07);color:#c8d8ea;padding:13px 28px;border-radius:8px;font-weight:500;font-size:.95rem;border:1px solid rgba(255,255,255,.12);transition:all .2s;display:inline-block}
.btn-g:hover{background:rgba(255,255,255,.13)}
.hero-stats{display:flex;gap:2.5rem;margin-top:3.5rem;padding-top:2.5rem;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
.hstat .n{font-size:1.9rem;font-weight:700;color:#fff}
.hstat .l{font-size:.75rem;color:#6a90b5;letter-spacing:.5px;margin-top:2px}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease}
.reveal.visible{opacity:1;transform:none}

/* SECTIONS */
.sec-light{padding:80px 5vw;background:var(--white)}
.sec-alt{padding:80px 5vw;background:var(--bg)}
.sec-dark{padding:80px 5vw;background:var(--ink)}
.sec-label{display:flex;align-items:center;gap:10px;margin-bottom:.7rem}
.sec-label::before{content:'';width:24px;height:2px;background:var(--accent);display:block;flex-shrink:0}
.sec-label span{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600}
.sec-dark .sec-label::before{background:#7ab3e8}
.sec-dark .sec-label span{color:#7ab3e8}
h2{font-size:1.7rem;font-weight:700;color:var(--ink);margin-bottom:.8rem}
.sec-dark h2{color:#fff}
.sec-sub{color:var(--muted);max-width:520px;font-size:.95rem}
.sec-dark .sec-sub{color:#8ca9c9}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;margin-top:2.5rem}
.about-body p{color:var(--muted);font-size:.95rem;line-height:1.8;margin-bottom:1rem}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.astat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.2rem;text-align:center;transition:transform .2s}
.astat:hover{transform:translateY(-3px)}
.astat .n{font-size:1.8rem;font-weight:700;color:var(--accent)}
.astat .l{font-size:.78rem;color:var(--muted);margin-top:2px}

/* INDUSTRIES */
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;margin-top:2.5rem}
.ind-card{background:var(--ink2);padding:2rem 1.6rem;transition:background .25s}
.ind-card:hover{background:#213d62}
.ind-icon{width:44px;height:44px;border-radius:10px;background:rgba(122,179,232,.12);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem}
.ind-icon svg{width:22px;height:22px;stroke:#7ab3e8;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ind-card h3{font-size:1rem;font-weight:700;color:#fff;margin-bottom:.5rem}
.ind-card p{font-size:.85rem;color:#8ca9c9;line-height:1.65}

/* SERVICES */
.srv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:2.5rem}
.srv{background:var(--white);padding:2rem 1.6rem;transition:background .2s}
.srv:hover{background:var(--sky)}
.srv-icon{width:44px;height:44px;border-radius:10px;background:var(--sky);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem}
.srv-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.srv h3{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:.5rem}
.srv p{font-size:.85rem;color:var(--muted);line-height:1.65}

/* WHY */
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;margin-top:2.5rem}
.why{background:var(--ink2);padding:2rem 1.6rem;transition:background .25s}
.why:hover{background:#213d62}
.why-icon{width:44px;height:44px;border-radius:10px;background:rgba(122,179,232,.12);display:flex;align-items:center;justify-content:center;margin-bottom:1.1rem}
.why-icon svg{width:20px;height:20px;stroke:#7ab3e8;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.why h4{font-size:1rem;font-weight:700;color:#fff;margin-bottom:.4rem}
.why p{font-size:.85rem;color:#8ca9c9;line-height:1.65}

/* DIRECTOR */
.dir-row{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.dir-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:2rem;display:flex;gap:1.4rem;align-items:flex-start}
.dir-av{width:72px;height:72px;border-radius:50%;background:var(--ink);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.av-init{font-size:.6rem;font-weight:700;color:#6a90b5;letter-spacing:1px}
.av-face{display:flex;flex-direction:column;align-items:center;gap:2px}
.av-brows{display:flex;gap:8px}
.av-brow{width:10px;height:2.5px;border-radius:2px;background:#7ab3e8}
.av-brow.l{transform:translateY(-2px) rotate(-20deg)}
.av-brow.r{transform:translateY(-2px) rotate(20deg)}
.av-eyes{display:flex;gap:10px}
.av-eye{width:8px;height:10px;border-radius:50%;background:#fff;border:2px solid #7ab3e8}
.av-mouth{width:14px;height:14px;border-radius:50%;border:2px solid #7ab3e8;margin-top:3px}
.dir-name{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:2px}
.dir-role{font-size:.78rem;color:var(--accent);font-weight:500;margin-bottom:.7rem}
.dir-bio{font-size:.875rem;color:var(--muted);line-height:1.75}

/* CONTACT */
.contact-row{display:flex;gap:0;margin-top:2.5rem;flex-wrap:wrap}
.ci{flex:1;min-width:160px;display:flex;gap:.9rem;align-items:flex-start}
.ci+.ci{border-left:1px solid rgba(255,255,255,.1);padding-left:2rem;margin-left:2rem}
.ci-icon{width:36px;height:36px;border-radius:8px;background:rgba(122,179,232,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-icon svg{width:16px;height:16px;stroke:#7ab3e8;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ci-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:#6a90b5;font-weight:600;margin-bottom:2px}
.ci-val{font-size:.95rem;color:#c8d8ea}
.contact-cta{display:inline-block;margin-top:2.5rem;background:var(--accent);color:#fff;padding:13px 32px;border-radius:8px;font-weight:600;font-size:.95rem;transition:background .2s}
.contact-cta:hover{background:#155fa0}

/* FOOTER */
footer{background:var(--ink);color:#5a7a9a;text-align:center;padding:1.6rem;font-size:.78rem;border-top:1px solid rgba(255,255,255,.06)}
footer strong{color:#8ca9c9}

/* RESPONSIVE */
@media(max-width:900px){
  .ind-grid,.srv-grid,.why-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .about-grid,.dir-row{grid-template-columns:1fr;gap:2rem}
  .nav-links{display:none}
  .ci+.ci{border-left:none;padding-left:0;margin-left:0;border-top:1px solid rgba(255,255,255,.1);padding-top:1rem;margin-top:1rem}
}
@media(max-width:480px){
  .ind-grid,.srv-grid,.why-grid{grid-template-columns:1fr}
  .about-stats{grid-template-columns:repeat(2,1fr)}
  .hero{min-height:auto;padding:70px 5vw}
  .hero h1{font-size:1.8rem}
  .hero-btns{flex-direction:column}
  .hero-btns a{text-align:center}
}
</style>
</head>
<body>

<nav>
  <div class="logo">JOB<span>ASSIST</span></div>
  <div class="nav-links">
    <a href="#about"><span class="t-da">Om os</span><span class="t-en" style="display:none">About</span></a>

    <button onclick="setLang('en',this)">EN</button>
  </div>
</nav>
<div class="divider"></div>

<!-- HERO -->
<section class="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-inner">
    <div class="hero-tag" data-da="Vikarbureau · Odense · Danmark" data-en="Staffing Agency · Odense · Denmark"></div>
    <h1 data-da="Din virksomhed vokser — <em>vi sørger for arbejdskraften</em>" data-en="Your business grows — <em>we provide the workforce</em>"></h1>
    <p class="hero-sub" data-da="Uanset om du driver et gartneri, en produktionsvirksomhed eller en lokal fødevareproducent — JOBASSIST leverer de rette hænder, præcis når du har brug for dem." data-en="Whether you run a greenhouse, a production facility, or a local food producer — JOBASSIST delivers the right hands exactly when you need them."></p>
    <div class="hero-btns">
      <a href="#contact" class="btn-p" data-da="Kontakt os i dag" data-en="Contact us today"></a>

      <div class="hstat"><div class="n" data-count="20">0</div><div class="l" data-da="ÅRS ERFARING" data-en="YEARS' EXPERIENCE"></div></div>

      <div class="hstat"><div class="n" data-static="true">Fyn</div><div class="l" data-da="LOKALT FORANKRET" data-en="LOCALLY ROOTED"></div></div>
    </div>
  </div>
</section>

<!-- ABOUT -->
<section class="sec-light reveal" id="about">
  <div class="sec-label"><span data-da="Om os" data-en="About us"></span></div>
  <h2 data-da="Vi løser dit bemandingsbehov — uanset branche" data-en="We solve your staffing needs — whatever the industry"></h2>
  <div class="about-grid">
    <div class="about-body">
      <p data-da="Mange virksomheder oplever perioder med spidsbelastning, sygdom eller sæsonudsving, hvor der hurtigt skal skaffes ekstra hænder. Det er præcis her, JOBASSIST gør en forskel. Vi har siden 2006 hjulpet virksomheder i Odense og på Fyn med at opretholde driften." data-en="Many businesses experience peak periods, sick leave, or seasonal swings where extra hands are needed fast. That's exactly where JOBASSIST makes a difference. Since 2006 we have helped companies in Odense and Funen keep operations running."></p>
      <p data-da="Vi kender de lokale brancher, vi kender arbejdsmarkedet, og vi kender de mennesker, der får tingene til at fungere." data-en="We know the local industries, we know the labour market, and we know the people who make things work."></p>
    </div>
    <div class="about-stats">
      <div class="astat"><div class="n">66+</div><div class="l" data-da="Medarbejdere" data-en="Employees"></div></div>
      <div class="astat"><div class="n">18</div><div class="l" data-da="Regnskabsår" data-en="Years active"></div></div>
      <div class="astat"><div class="n">Odense</div><div class="l" data-da="Hjemsted" data-en="Base"></div></div>
      <div class="astat"><div class="n">3F</div><div class="l" data-da="Overenskomst" data-en="Agreement"></div></div>
    </div>
  </div>
</section>

<!-- INDUSTRIES -->
<section class="sec-dark reveal" id="industries">
  <div class="sec-label"><span data-da="Brancher vi hjælper" data-en="Industries we serve"></span></div>
  <h2 data-da="Vi kender din branche" data-en="We know your industry"></h2>
  <p class="sec-sub" data-da="Fra gartneri til produktion — vi har medarbejdere med den rette erfaring og indstilling til at løse opgaven fra dag ét." data-en="From greenhouses to production lines — we have workers with the right experience and attitude to get the job done from day one."></p>
  <div class="ind-grid">
    <div class="ind-card">
      <div class="ind-icon"><svg viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 1 0 18"/><path d="M12 2C6.5 2 2 6.5 2 12"/><path d="M12 6c0 4-2 6-2 6h4s-2-2-2-6z"/><path d="M12 12v8"/></svg></div>

      <p data-da="Stik, pak og sortering af blomster og planter til gartnerier i og omkring Odense." data-en="Planting, packing, and sorting flowers and plants for greenhouses in and around Odense."></p>
    </div>
    <div class="ind-card">
      <div class="ind-icon"><svg viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg></div>

      <p data-da="Høst, pakning og håndtering af råvarer med erfarne og pålidelige medarbejdere." data-en="Harvesting, packing, and handling produce with experienced and reliable workers."></p>
    </div>
    <div class="ind-card">
      <div class="ind-icon"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></div>
      <h3 data-da="Industri & produktion" data-en="Industry & manufacturing"></h3>
      <p data-da="Stabil bemanding til produktionslinjer, lager og montage med erfaring i fysisk arbejde." data-en="Steady staffing for production lines, warehousing, and assembly with hands-on experience."></p>
    </div>
    <div class="ind-card">
      <div class="ind-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
      <h3 data-da="Lager & logistik" data-en="Warehouse & logistics"></h3>
      <p data-da="Plukning, pakning og håndtering af varer — klar til at styrke din logistik i spidsperioder." data-en="Picking, packing, and goods handling — ready to reinforce your logistics during peak periods."></p>
    </div>
  </div>
</section>

<!-- SERVICES -->
<section class="sec-alt reveal" id="services">
  <div class="sec-label"><span data-da="Ydelser" data-en="Services"></span></div>

      <h3 data-da="Rekruttering" data-en="Recruitment"></h3>

      <div class="srv-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>

<!-- WHY -->
<section class="sec-dark reveal" id="why">
  <div class="sec-label"><span data-da="Hvorfor os" data-en="Why us"></span></div>
  <h2 data-da="Hvad gør os anderledes" data-en="What sets us apart"></h2>
  <div class="why-grid">
    <div class="why">
      <div class="why-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>

      <p data-da="Dyb forståelse af det danske arbejdsmarked og dets særlige behov." data-en="Deep understanding of the Danish labour market and its specific demands."></p>
    </div>
    <div class="why">
      <div class="why-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <h4 data-da="Lokal tilstedeværelse" data-en="Local presence"></h4>
      <p data-da="Forankret i Odense med stærke relationer til erhvervslivet på Fyn." data-en="Rooted in Odense with strong ties to the Funen business community."></p>
    </div>
    <div class="why">
      <div class="why-icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <h4 data-da="Hurtig levering" data-en="Fast turnaround"></h4>
      <p data-da="Vi reagerer hurtigt og matcher de rette kandidater på korteste tid." data-en="We act fast and match the right candidates in the shortest possible time."></p>
    </div>

<script>
/* LANG */
function setLang(lang,btn){
  document.querySelectorAll('.lang-btn button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.lang=lang;
  const other=lang==='da'?'en':'da';
  document.querySelectorAll('.t-'+lang).forEach(el=>el.style.display='');
  document.querySelectorAll('.t-'+other).forEach(el=>el.style.display='none');
  document.querySelectorAll('[data-'+lang+']').forEach(el=>el.innerHTML=el.getAttribute('data-'+lang));
}

/* SMOOTH SCROLL */
document.addEventListener('DOMContentLoaded',()=>{
  setLang('da',document.querySelector('.lang-btn button.active'));
  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener('click',e=>{
      const t=document.querySelector(a.getAttribute('href'));
      if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}
    });
  });

  /* SCROLL REVEAL */
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{if(en.isIntersecting)en.target.classList.add('visible')});
  },{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

  /* COUNT-UP */
  const counters=document.querySelectorAll('[data-count]');
  const cObs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting&&!en.target.dataset.done){
        en.target.dataset.done=1;
        const end=+en.target.dataset.count;
        const suffix=end===18?'+':end===66?'+':'';
        let start=0;const dur=1200;const step=16;
        const inc=end/(dur/step);
        const t=setInterval(()=>{
          start=Math.min(start+inc,end);
          en.target.textContent=Math.round(start)+suffix;
          if(start>=end)clearInterval(t);
        },step);
      }
    });
  },{threshold:.5});
  counters.forEach(c=>{if(!c.dataset.static)cObs.observe(c)});

  /* HERO CANVAS */
  const canvas=document.getElementById('hero-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,pts;
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;init()}
  function init(){
    pts=Array.from({length:55},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(122,179,232,.6)';ctx.fill();
    });
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){
        ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(122,179,232,${.15*(1-d/120)})`;ctx.lineWidth=.8;ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
});
</script>
